name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v5.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish to Hex + Update Website
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Setup BEAM (Erlang + Gleam)
        uses: erlef/setup-beam@e6d7c94229049569db56a7ad5a540c051a010af9 # v1
        with:
          otp-version: "27"
          gleam-version: "1.15.4"
          rebar3-version: "3.25.0"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' gleam.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing caffeine_lang v${VERSION}"

      - name: Run tests before publishing
        run: |
          gleam test
          gleam test --target javascript

      - name: Publish to Hex
        env:
          HEXPM_API_KEY: ${{ secrets.HEX_RELEASE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Publishing caffeine_lang v${VERSION} to Hex..."
          gleam publish --yes

      - name: Build browser bundle
        run: ./scripts/bundle-browser.sh

      - name: Update website compiler
        env:
          WEBSITE_TOKEN: ${{ secrets.GH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git clone "https://x-access-token:${WEBSITE_TOKEN}@github.com/Brickell-Research/caffeine_lang_website.git" website
          cd website

          cp ../dist/caffeine-browser.js static/js/

          cat > src/version.gleam << EOF
          // Auto-generated by release workflow - do not edit manually
          pub const latest_version = "v${VERSION}"
          EOF
          sed -i 's/^        //' src/version.gleam

          gleam deps download
          gleam run -m build

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add static/js/caffeine-browser.js src/version.gleam docs/
          if git diff --cached --quiet; then
            echo "Website already up to date"
          else
            git commit -m "Update Caffeine compiler to ${VERSION}"
            git push origin main
          fi
